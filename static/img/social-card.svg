      <stop offset="0%" stop-color="#FBF8F2"/>
      <stop offset="100%" stop-color="#F3EFE6"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <g transform="translate(80, 80)">
    <!-- Mark -->
    <g transform="scale(2.6)">
