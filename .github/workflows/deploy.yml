name: Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

# Cancel in-progress runs when a new commit lands on main.
concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

env:
  NODE_VERSION: '20'
  # ─── Deployment target ──────────────────────────────────────────────────────
  # Set to `ghpages` while the site is served at the GitHub Pages preview URL
  # (https://raazkhnl.github.io/EduHub/) — Docusaurus builds with the right
  # baseUrl and omits the CNAME file so GH Pages doesn't redirect.
  #
  # Once the custom domain (eduhub.khanalrajesh.com.np) is live and verified in
  # Settings → Pages, change the value below to an empty string ('') or delete
  # the line entirely. The build will then default to baseUrl `/` and ship the
  # CNAME file again, locking the deploy onto the custom domain.
  #
  # To override per-run (e.g. testing a branch), define a repo *variable* of
  # the same name at Settings → Secrets and variables → Actions → Variables
  # and adjust the env-block below to read from `${{ vars.DEPLOY_TARGET }}`.
  DEPLOY_TARGET: 'ghpages'

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # needed for "last updated" git stamps in the docs theme

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci --no-audit --no-fund

      - name: Build site
        # DEPLOY_TARGET is inherited from the workflow-level env block above.
        env:
          ALGOLIA_APP_ID:   ${{ secrets.ALGOLIA_APP_ID }}
          ALGOLIA_API_KEY:  ${{ secrets.ALGOLIA_API_KEY }}
          ALGOLIA_INDEX:    ${{ secrets.ALGOLIA_INDEX }}
          GA_TRACKING_ID:   ${{ secrets.GA_TRACKING_ID }}
        run: npm run build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build

  deploy:
    name: Deploy to GitHub Pages
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url:  ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy
        id: deployment
        uses: actions/deploy-pages@v4
